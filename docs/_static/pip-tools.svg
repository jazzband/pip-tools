    </g>
    <text x="118" y="304" font-size="29" font-weight="700" fill="#1072F2"
          font-family="'JetBrains Mono','Fira Code',Consolas,monospace">== 3.5.1</text>
    <g transform="translate(290 294)">
      <circle cx="0" cy="0" r="20" fill="#FFC200"/>
      <path d="M -9 0 L -2 6 L 9 -5" fill="none" stroke="#ffffff"
            stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- pip-tools wordmark (~10px below the document) -->
  <text x="200" y="432" text-anchor="middle" font-size="58" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#1072F2">pip-</tspan><tspan fill="#FFC200">tools</tspan>
  </text>
